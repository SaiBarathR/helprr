services:
  helprr-db:
    image: postgres:16-alpine
    container_name: helprr-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=helprr
    volumes:
      - helprr-db-data:/var/lib/postgresql/data
    networks:
      - helprr-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  helprr-redis:
    image: redis:7-alpine
    container_name: helprr-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: [ "sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes" ]
    volumes:
      - helprr-redis-data:/data
    networks:
      - helprr-net
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG" ]
      interval: 5s
      timeout: 5s
      retries: 5

  helprr:
    build:
      context: .
      args:
        - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    container_name: helprr
    restart: unless-stopped
    ports:
      - "3050:3050"
    depends_on:
      helprr-db:
        condition: service_healthy
      helprr-redis:
        condition: service_healthy
    environment:
      - TZ=${TZ:-UTC}
      - LOG_DIR=${LOG_DIR:-/app/logs}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@helprr-db:5432/helprr}
      - REDIS_URL=${REDIS_URL:-redis://helprr-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_PASSWORD=${APP_PASSWORD}
      - HELPRR_ADMIN_USERNAME=${HELPRR_ADMIN_USERNAME}
      - HELPRR_ADMIN_PASSWORD_RESET=${HELPRR_ADMIN_PASSWORD_RESET}
      - TRUST_FORWARDED_PROTO=${TRUST_FORWARDED_PROTO}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - APP_ORIGIN=${APP_ORIGIN}
    volumes:
      - helprr-logs:${LOG_DIR:-/app/logs}
    networks:
      - helprr-net

networks:
  helprr-net:
    driver: bridge

volumes:
  helprr-db-data:
  helprr-logs:
  helprr-redis-data:
