services:
  helprr-db:
    image: postgres:16-alpine
    container_name: helprr-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=helprr
    volumes:
      - helprr-db-data:/var/lib/postgresql/data
    networks:
      - helprr-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  helprr-redis:
    image: redis:7-alpine
    container_name: helprr-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: [ "sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes" ]
    volumes:
      - helprr-redis-data:/data
    networks:
      - helprr-net
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG" ]
      interval: 5s
      timeout: 5s
      retries: 5

  helprr:
    # Published image. Pin a version with HELPRR_VERSION (e.g. 1.0.0); the
    # default channel becomes `stable` with the 1.0.0 release. To build from
    # source instead:
    #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
    image: ghcr.io/saibarathr/helprr:${HELPRR_VERSION:-edge}
    container_name: helprr
    restart: unless-stopped
    ports:
      - "3050:3050"
    depends_on:
      helprr-db:
        condition: service_healthy
      helprr-redis:
        condition: service_healthy
    environment:
      - TZ=${TZ:-UTC}
      - LOG_DIR=${LOG_DIR:-/app/logs}
      # Default URL embeds POSTGRES_PASSWORD; if the password contains URL
      # special characters (@ : / ? # etc.), set DATABASE_URL explicitly with
      # the password percent-encoded.
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@helprr-db:5432/helprr}
      - REDIS_URL=${REDIS_URL:-redis://helprr-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_PASSWORD=${APP_PASSWORD}
      - HELPRR_ADMIN_USERNAME=${HELPRR_ADMIN_USERNAME:-}
      - HELPRR_ADMIN_PASSWORD_RESET=${HELPRR_ADMIN_PASSWORD_RESET:-}
      - TRUST_FORWARDED_PROTO=${TRUST_FORWARDED_PROTO:-}
      # Must be >=32 chars or the app refuses to boot. Generate: openssl rand -base64 48
      - JWT_SECRET=${JWT_SECRET}
      # VAPID_PUBLIC_KEY is runtime config (NEXT_PUBLIC_VAPID_PUBLIC_KEY kept as
      # a fallback for .env files from when it was baked in at build time).
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - APP_ORIGIN=${APP_ORIGIN:-}
      - HELPRR_CUSTOM_HEADERS=${HELPRR_CUSTOM_HEADERS:-}
      - EXTRA_ALLOWED_IMAGE_HOSTS=${EXTRA_ALLOWED_IMAGE_HOSTS:-}
      - IMAGE_CACHE_DIR=${IMAGE_CACHE_DIR:-}
      - IMAGE_CACHE_TTL_SECONDS=${IMAGE_CACHE_TTL_SECONDS:-}
      - IMAGE_CACHE_STALE_SECONDS=${IMAGE_CACHE_STALE_SECONDS:-}
      - IMAGE_UPSTREAM_FETCH_TIMEOUT_MS=${IMAGE_UPSTREAM_FETCH_TIMEOUT_MS:-}
      - TMDB_CACHE_DEFAULT_TTL_SECONDS=${TMDB_CACHE_DEFAULT_TTL_SECONDS:-}
      - TMDB_CACHE_DISCOVER_TTL_SECONDS=${TMDB_CACHE_DISCOVER_TTL_SECONDS:-}
      - TMDB_CACHE_DETAILS_TTL_SECONDS=${TMDB_CACHE_DETAILS_TTL_SECONDS:-}
      - TMDB_CACHE_STATIC_TTL_SECONDS=${TMDB_CACHE_STATIC_TTL_SECONDS:-}
      - TMDB_CACHE_STALE_SECONDS=${TMDB_CACHE_STALE_SECONDS:-}
      - CACHE_LOCK_TTL_MS=${CACHE_LOCK_TTL_MS:-}
    volumes:
      - helprr-logs:${LOG_DIR:-/app/logs}
    networks:
      - helprr-net
    healthcheck:
      # Flags a wedged Node process as unhealthy (restart-on-unhealthy needs an
      # external supervisor like autoheal; plain Docker only reports status).
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:3050/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      # Entrypoint runs `prisma migrate deploy` before the server starts.
      start_period: 60s

networks:
  helprr-net:
    driver: bridge

volumes:
  helprr-db-data:
  helprr-logs:
  helprr-redis-data:
