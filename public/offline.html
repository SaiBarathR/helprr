<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · Helprr</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
        background: #0b0b0d;
        color: #e7e5e4;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .card { max-width: 24rem; }
      .icon {
        width: 3rem; height: 3rem; margin: 0 auto 1.25rem;
        display: flex; align-items: center; justify-content: center;
        border-radius: 9999px;
        background: rgba(245, 158, 11, 0.12);
        color: #f59e0b;
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
      p { font-size: 0.9rem; line-height: 1.5; color: #a8a29e; margin: 0 0 1.5rem; }
      button {
        appearance: none; border: 0; cursor: pointer;
        font: inherit; font-weight: 600; font-size: 0.9rem;
        padding: 0.7rem 1.4rem; border-radius: 0.75rem;
        background: #f59e0b; color: #1c1917;
        min-height: 44px;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>This page hasn't been opened yet, so there's no saved copy to show. Pages you've already visited still work offline.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
