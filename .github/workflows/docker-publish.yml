name: Docker publish

on:
  push:
    branches: [development]
    tags: ['v*.*.*']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

env:
  IMAGE: ghcr.io/saibarathr/helprr

# Each platform builds natively (no QEMU — Node's JIT crashes/hangs under
# arm64 emulation) and pushes by digest; the merge job assembles the
# multi-arch manifest and applies the tags.
jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Prepare platform slug
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      # VAPID keys are intentionally not passed: every installation injects its
      # own key pair at runtime, so published images contain no shared key.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      # Scan each native runtime image before its digest is exported to the
      # manifest job. A finding therefore blocks edge/version tags for both
      # architectures. Pin the action by commit after the 2026 Trivy ecosystem
      # incident; the comment records the corresponding immutable release.
      - name: Scan image for fixable high/critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_EXIT_ON_EOL: '1'
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          version: v0.70.0
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'
          timeout: 10m0s

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   push to development      -> edge
      #   tag v1.2.3               -> 1.2.3 only until that exact image passes
      #                                 the production smoke check
      #   tag v1.0.0-rc.1          -> 1.0.0-rc.1 only (no channel tags)
      # After qualification, the exact digest is manually promoted to the
      # minor, major, and stable aliases. No `latest` tag on purpose.
      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/development' }}
            type=semver,pattern={{version}}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"

  # On version tags, draft a GitHub release carrying the two files a user needs
  # (docker-compose.yml + .env.example) so installs can fetch the exact files
  # matching their version. Draft on purpose: finalize notes from CHANGELOG.md
  # before publishing.
  release:
    needs: merge
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Draft release with deployment assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          # GitHub forbids asset names starting with a dot — ship it as env.example.
          cp .env.example env.example
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            $prerelease_flag \
            docker-compose.yml env.example
