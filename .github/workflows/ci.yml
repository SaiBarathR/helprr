name: CI

on:
  push:
    branches: [development, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-migration-password
          POSTGRES_DB: helprr_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d helprr_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Test upgrades from released database snapshots
        run: npm run test:migrations
        env:
          MIGRATION_TEST_DATABASE_URL: postgresql://postgres:ci-migration-password@localhost:5432/helprr_migration_test

      - name: Build
        run: npm run build
        env:
          # Dummy values — nothing connects during a build, but env validation
          # and any statically-collected route must not fail on missing config.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          REDIS_PASSWORD: ci-dummy-password
          APP_PASSWORD: ci-dummy-password
          JWT_SECRET: ci-dummy-jwt-secret-at-least-32-characters-long

  # PR-time image scan: builds the amd64 image without pushing and runs the
  # same pinned, blocking Trivy gate that guards publishes, so vulnerabilities
  # surface at review time instead of at the first post-merge image build.
  # (Publishes still scan both native platforms in docker-publish.yml.)
  image-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: helprr-pr-scan:local
          # Read the publish workflow's build cache for this platform; the PR
          # scan never writes cache so it cannot churn the publish cache.
          cache-from: type=gha,scope=linux-amd64

      - name: Scan image for fixable high/critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_EXIT_ON_EOL: '1'
        with:
          version: v0.70.0
          image-ref: helprr-pr-scan:local
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'
          timeout: 10m0s
