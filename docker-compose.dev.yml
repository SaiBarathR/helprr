# Build-from-source override. Use together with the main file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
# Needed for Web Push today: NEXT_PUBLIC_VAPID_PUBLIC_KEY is baked in at build
# time, so published images cannot carry your per-install key yet.
services:
  helprr:
    build:
      context: .
      args:
        - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
